name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Confirm production deployment'
        required: true
        type: choice
        options:
          - 'no'
          - 'yes'

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  GCP_REGION: us-central1

jobs:
  authorize:
    runs-on: ubuntu-latest
    name: Authorize Deployment
    environment: production

    steps:
      - name: Verify approval
        if: ${{ github.event.inputs.confirm != 'yes' }}
        run: |
          echo "Production deployment not confirmed"
          exit 1

      - name: Log authorization
        run: |
          echo "Production deployment authorized by ${{ github.actor }}"

  deploy-aws-production:
    needs: authorize
    runs-on: ubuntu-latest
    name: Deploy AWS to Production

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install -g aws-cdk && npm ci

      - name: Promote Lambda alias to 100%
        run: |
          aws lambda update-alias \
            --function-name mvt-signal-processor \
            --name production \
            --routing-config AdditionalVersionWeights="{}"

      - name: CDK deploy to production
        run: cdk deploy --all --require-approval never
        working-directory: cdk/
        env:
          ENVIRONMENT: production

  deploy-gcp-production:
    needs: authorize
    runs-on: ubuntu-latest
    name: Deploy GCP to Production

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform plan
        run: |
          cd terraform
          terraform init -backend-config="bucket=${{ secrets.GCP_TERRAFORM_BUCKET }}" \
                        -backend-config="prefix=production"
          terraform plan -var-file="environments/prod.tfvars" \
                        -var="environment=production" \
                        -out=tfplan
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID_PROD }}
          TF_VAR_aws_event_relay_endpoint: ${{ secrets.AWS_EVENT_RELAY_ENDPOINT }}

      - name: Terraform apply
        run: |
          cd terraform
          terraform apply tfplan
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID_PROD }}

      - name: Promote Cloud Run to 100%
        run: |
          gcloud run services update-traffic gdelt-extractor \
            --region ${{ env.GCP_REGION }} \
            --to-revisions LATEST=100
        env:
          CLOUDSDK_CORE_PROJECT: ${{ secrets.GCP_PROJECT_ID_PROD }}

  smoke-tests:
    needs:
      - deploy-aws-production
      - deploy-gcp-production
    runs-on: ubuntu-latest
    name: Smoke Tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run smoke tests against production
        run: pytest tests/smoke/ -v
        env:
          ENVIRONMENT: production
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID_PROD }}
          AWS_REGION: ${{ env.AWS_REGION }}

  notify-completion:
    if: always()
    needs:
      - authorize
      - deploy-aws-production
      - deploy-gcp-production
      - smoke-tests
    runs-on: ubuntu-latest
    name: Notify Completion

    steps:
      - uses: actions/checkout@v4

      - name: Determine overall status
        id: status
        run: |
          if [[ "${{ needs.deploy-aws-production.result }}" == "success" && \
                "${{ needs.deploy-gcp-production.result }}" == "success" && \
                "${{ needs.smoke-tests.result }}" == "success" ]]; then
            echo "overall=success" >> $GITHUB_OUTPUT
            echo "emoji=🚀" >> $GITHUB_OUTPUT
          else
            echo "overall=failure" >> $GITHUB_OUTPUT
            echo "emoji=⚠️" >> $GITHUB_OUTPUT
          fi

      - name: Update JIRA with production deployment
        if: steps.status.outputs.overall == 'success'
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "body": "🚀 Production deployment successful: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' \
            "${{ secrets.JIRA_ISSUE_URL }}/comment"
        continue-on-error: true

      - name: Notify Telegram - Production Release
        run: |
          curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="${{ steps.status.outputs.emoji }} MVT Trilogy released to production! Build: ${{ github.run_id }}"
        continue-on-error: true

      - name: Generate release notes
        if: steps.status.outputs.overall == 'success'
        run: |
          cat > RELEASE_NOTES.md << EOF
          # Production Release - Build ${{ github.run_id }}

          **Status:** ${{ steps.status.outputs.overall }}

          **Commit:** ${{ github.sha }}

          **Deployment Time:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')

          ## Services Deployed
          - AWS Lambda (mvt-signal-processor)
          - GCP Cloud Functions (signal-processor, analytics-writer, gdelt-extractor)
          - GCP BigQuery (mvt_analytics dataset)
          - GCP Firestore (dashboard state)
          - Firebase Hosting (analytics dashboard)

          ## Monitoring
          - [CloudWatch](https://console.aws.amazon.com/cloudwatch)
          - [Cloud Monitoring](https://console.cloud.google.com/monitoring)

          EOF

      - name: Create GitHub Release
        if: steps.status.outputs.overall == 'success'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: release-${{ github.run_id }}
          release_name: Production Release ${{ github.run_id }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
