name: Deploy to Staging

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  GCP_REGION: us-central1
  STAGING_SUFFIX: staging

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          npm ci
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: |
          npm run test:unit
          pytest tests/unit/ -v

      - name: Build artifacts
        run: npm run build

  deploy-gcp-staging:
    needs: test
    runs-on: ubuntu-latest
    name: Deploy GCP to Staging

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform plan
        run: |
          cd terraform
          terraform init -backend-config="bucket=${{ secrets.GCP_TERRAFORM_BUCKET }}" \
                        -backend-config="prefix=staging"
          terraform plan -var-file="environments/dev.tfvars" \
                        -var="environment=staging" \
                        -out=tfplan
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID_STAGING }}
          TF_VAR_aws_event_relay_endpoint: ${{ secrets.AWS_EVENT_RELAY_ENDPOINT }}

      - name: Terraform apply
        run: |
          cd terraform
          terraform apply tfplan
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID_STAGING }}

      - name: Capture outputs
        id: tf-outputs
        run: |
          cd terraform
          echo "pubsub_signals_topic=$(terraform output -raw pubsub_signals_topic)" >> $GITHUB_OUTPUT
          echo "bigquery_dataset=$(terraform output -raw bigquery_dataset_id)" >> $GITHUB_OUTPUT
          echo "hosting_url=$(terraform output -raw hosting_bucket_url)" >> $GITHUB_OUTPUT
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID_STAGING }}

  deploy-cdk-staging:
    needs: test
    runs-on: ubuntu-latest
    name: Deploy AWS CDK to Staging

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm install -g aws-cdk && npm ci

      - name: CDK synth
        run: cdk synth
        working-directory: cdk/

      - name: CDK deploy to staging
        run: cdk deploy --all --require-approval never
        working-directory: cdk/
        env:
          ENVIRONMENT: staging
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

      - name: Get CDK outputs
        id: cdk-outputs
        run: |
          BUCKET_NAME=$(aws cloudformation describe-stacks --stack-name MVT-Frontend-dev --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" --output text 2>/dev/null || echo "")
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks --stack-name MVT-Frontend-dev --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" --output text 2>/dev/null || echo "")
          echo "bucket_name=$BUCKET_NAME" >> $GITHUB_OUTPUT
          echo "distribution_id=$DISTRIBUTION_ID" >> $GITHUB_OUTPUT

      - name: Upload dashboard to S3
        if: steps.cdk-outputs.outputs.bucket_name != ''
        run: |
          aws s3 sync frontend/ s3://${{ steps.cdk-outputs.outputs.bucket_name }}/ --delete
          echo "Dashboard uploaded to S3"

      - name: Invalidate CloudFront cache
        if: steps.cdk-outputs.outputs.distribution_id != ''
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ steps.cdk-outputs.outputs.distribution_id }} --paths "/*"
          echo "CloudFront cache invalidated"

      - name: Update Telegram bot Lambda
        run: |
          cd telegram-bot
          zip -j /tmp/telegram-bot.zip lambda_function.py
          aws lambda update-function-code --function-name mvt-telegram-bot --zip-file fileb:///tmp/telegram-bot.zip
          aws lambda wait function-updated --function-name mvt-telegram-bot
          aws lambda update-function-configuration --function-name mvt-telegram-bot \
            --timeout 60 \
            --environment "Variables={TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }},ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},JIRA_BASE_URL=https://themarketgraph.atlassian.net,JIRA_EMAIL=nemesisvbk@gmail.com,JIRA_API_TOKEN=${{ secrets.JIRA_API_TOKEN }},JIRA_PROJECT_KEY=MVT,DASHBOARD_URL=https://d2p9otbgwjwwuv.cloudfront.net,CLAUDE_MODEL=claude-opus-4-6,CLAUDE_MODEL_CODING=claude-sonnet-4-6}"
          echo "Telegram bot Lambda updated"
        continue-on-error: true

  integration-tests:
    needs:
      - deploy-gcp-staging
      - deploy-cdk-staging
    runs-on: ubuntu-latest
    name: Integration Tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run integration tests
        run: pytest tests/integration/ -v
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID_STAGING }}
          AWS_REGION: ${{ env.AWS_REGION }}
          STAGING_URLS: ${{ needs.deploy-gcp-staging.outputs.hosting_url }}

  notify-results:
    if: always()
    needs:
      - test
      - deploy-gcp-staging
      - deploy-cdk-staging
      - integration-tests
    runs-on: ubuntu-latest
    name: Notify Results

    steps:
      - uses: actions/checkout@v4

      - name: Determine overall status
        id: status
        run: |
          if [[ "${{ needs.test.result }}" == "success" && \
                "${{ needs.deploy-gcp-staging.result }}" == "success" && \
                "${{ needs.deploy-cdk-staging.result }}" == "success" && \
                "${{ needs.integration-tests.result }}" == "success" ]]; then
            echo "overall=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          else
            echo "overall=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          fi

      - name: Update JIRA with staging deployment
        if: steps.status.outputs.overall == 'success'
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "body": "Staging deployment successful: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' \
            "${{ secrets.JIRA_ISSUE_URL }}/comment"
        continue-on-error: true

      - name: Notify Telegram
        run: |
          curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="${{ steps.status.outputs.emoji }} Staging deployment ${{ steps.status.outputs.overall }}: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        continue-on-error: true
